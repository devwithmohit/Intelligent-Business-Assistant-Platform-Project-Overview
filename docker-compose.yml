services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://iba_user:iba_pass@postgres:5432/iba_db
      REDIS_URL: redis://redis:6379/0
      WORKFLOW_DIR: /app/data/workflows
      WORKFLOW_STATE_DIR: /app/data/workflow_states
      CHROMA_DIR: /app/data/vector_db/chroma
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chroma:
        condition: service_started

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    environment:
      VITE_API_URL: http://localhost:8000
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: iba_db
      POSTGRES_USER: iba_user
      POSTGRES_PASSWORD: iba_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iba_user -d iba_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:0.4.18
    ports:
      - "8001:8001"
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  chromadata:
