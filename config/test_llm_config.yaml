# config/test_llm_config.yaml
# Validation suite for config/llm_config.yaml
# Each entry describes a single check. A lightweight test runner can load this YAML
# and evaluate the "assertion" snippets against the parsed YAML config dict named `cfg`.
# The assertion snippets are illustrative Python expressions that should evaluate True
# when the config is valid. Do not include any secret-checking assertions.

suite_name: llm_config_validation
version: 1
description: "Tests to validate structure and basic semantics of config/llm_config.yaml used for LLM/embedding settings and KB defaults."

tests:
  - id: file_exists_and_nonempty
    severity: error
    description: "Config file must exist and not be empty."
    assertion: "cfg is not None and isinstance(cfg, dict) and len(cfg) > 0"
    expected_type: mapping
    helpful_fix: "Create config/llm_config.yaml and define top-level keys like 'embeddings', 'chunking', 'providers', 'default_kb_provider'."

  - id: top_level_keys
    severity: error
    description: "Top-level keys must include embeddings, chunking, providers, default_kb_provider."
    assertion: "all(k in cfg for k in ['embeddings','chunking','providers','default_kb_provider'])"
    expected_type: mapping
    helpful_fix: "Add missing keys. Example: embeddings: { default_model: 'text-embedding-v1', models: {...} }"

  - id: embeddings_section_shape
    severity: error
    description: "embeddings must be a mapping with default_model (string) and models (mapping)."
    assertion: "isinstance(cfg.get('embeddings'), dict) and isinstance(cfg['embeddings'].get('default_model'), str) and cfg['embeddings'].get('default_model')"
    expected_type: mapping
    helpful_fix: "Ensure embeddings.default_model is a non-empty string and embeddings.models is a mapping of model names."

  - id: embeddings_models_entries
    severity: error
    description: "Each embeddings.models entry must include provider (string) and dimensions (positive int)."
    assertion: "isinstance(cfg['embeddings'].get('models'), dict) and all(isinstance(m := v, dict) and isinstance(m.get('provider'), str) and isinstance(m.get('dimensions'), int) and m.get('dimensions') > 0 for v in cfg['embeddings']['models'].values())"
    expected_type: mapping
    helpful_fix: "For each model under embeddings.models add provider and dimensions keys, e.g. dimensions: 1536"

  - id: chunking_section_shape
    severity: error
    description: "chunking must define numeric token limits: max_tokens, overlap, min_tokens."
    assertion: "isinstance(cfg.get('chunking'), dict) and all(k in cfg['chunking'] for k in ['max_tokens','overlap','min_tokens']) and all(isinstance(cfg['chunking'][k], int) for k in ['max_tokens','overlap','min_tokens'])"
    expected_type: mapping
    helpful_fix: "Set chunking.max_tokens (e.g. 512), chunking.overlap (e.g. 64), chunking.min_tokens (e.g. 8)."

  - id: chunking_ranges
    severity: error
    description: "chunking ranges must be sensible: min_tokens >=1, overlap >=0 and < max_tokens, max_tokens <= 32768."
    assertion: "m := cfg['chunking']; isinstance(m, dict) and (m['min_tokens'] >= 1) and (0 <= m['overlap'] < m['max_tokens']) and (1 <= m['max_tokens'] <= 32768)"
    expected_type: numeric
    helpful_fix: "Adjust chunking values so overlap < max_tokens and values are within practical limits."

  - id: providers_section_shape
    severity: error
    description: "providers must be a mapping with at least one provider entry."
    assertion: "isinstance(cfg.get('providers'), dict) and len(cfg['providers']) >= 1"
    expected_type: mapping
    helpful_fix: "Define at least one provider under providers, e.g. providers.deepseek: { type: 'api', endpoint: 'https://...' }"

  - id: provider_entry_minimal_keys
    severity: warning
    description: "Each provider entry should include a type/kind string and may include endpoint. Do not assert secrets."
    assertion: "all(isinstance(p, dict) and (isinstance(p.get('type'), str) or isinstance(p.get('kind'), str)) for p in cfg['providers'].values())"
    expected_type: mapping
    helpful_fix: "Add 'type' or 'kind' to provider entries, e.g. type: 'openapi'"

  - id: default_kb_provider_valid
    severity: error
    description: "default_kb_provider must be a string and reference a provider defined in providers."
    assertion: "isinstance(cfg.get('default_kb_provider'), str) and cfg['default_kb_provider'] in cfg.get('providers', {})"
    expected_type: string
    helpful_fix: "Set default_kb_provider to one of the provider keys defined under providers."

  - id: default_model_in_models
    severity: error
    description: "embeddings.default_model must reference a model name present under embeddings.models."
    assertion: "dm := cfg['embeddings'].get('default_model'); isinstance(dm, str) and dm in cfg['embeddings'].get('models', {})"
    expected_type: string
    helpful_fix: "Either create a model entry matching embeddings.default_model or update default_model to an existing model name."

  - id: model_provider_exists
    severity: error
    description: "Each embeddings model that references a provider must reference an existing provider from providers mapping."
    assertion: "models := cfg['embeddings'].get('models', {}); all((m.get('provider') in cfg.get('providers')) for m in models.values())"
    expected_type: mapping
    helpful_fix: "Ensure embeddings.models.*.provider matches a key in providers."

  - id: numeric_limits_for_dimensions
    severity: warning
    description: "Embedding dimensions should be within reasonable bounds (1..16384)."
    assertion: "all(1 <= m.get('dimensions', 0) <= 16384 for m in cfg['embeddings'].get('models', {}).values())"
    expected_type: numeric
    helpful_fix: "Set realistic dimensions for models (e.g. 512, 1024, 1536)."

  - id: optional_llm_defaults
    severity: info
    description: "If llm_defaults present, check types for temperature and max_tokens."
    assertion: "ld := cfg.get('llm_defaults'); (ld is None) or (isinstance(ld.get('temperature', 0.0), (int,float)) and ('max_tokens' not in ld or isinstance(ld['max_tokens'], int)))"
    expected_type: mapping_or_null
    helpful_fix: "Ensure llm_defaults.temperature is numeric and max_tokens is integer if provided."

  - id: no_secret_leak_checks
    severity: info
    description: "Do not assert presence of secrets (API keys) in repo configs; this test suite avoids secret validation."
    assertion: "True"
    expected_type: none
    helpful_fix: "Store secrets in env vars or a secure secrets manager; do not commit them to config files."

notes:
  - "This YAML is a specification for validation tests. A small Python runner can parse config/llm_config.yaml into `cfg` and evaluate each test's 'assertion' string using safe evaluation (avoid executing untrusted code)."
  - "Keep assertions read-only and limited to type/shape/range checks. Do not attempt network calls or secret verifications in these tests."